services:
  postgres:
    image: postgres:15-alpine
    container_name: tarkify-postgres
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${PG_USER:-tarkify_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-tarkifyPassword}
      POSTGRES_DB: ${PG_DB:-tarkifyDB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-tarkify_user} -d ${PG_DB:-tarkifyDB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tarkify-backend
    restart: always
    ports:
      - "3009:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${PG_USER:-tarkify_user}:${PG_PASSWORD:-tarkifyPassword}@postgres:5432/${PG_DB:-tarkifyDB}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      STORAGE_PATH: /app/storage
      DOWNLOAD_TOKEN_TTL_SECONDS: ${DOWNLOAD_TOKEN_TTL_SECONDS:-600}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
    stop_grace_period: 30s
    init: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
