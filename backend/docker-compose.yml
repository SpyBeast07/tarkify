services:
  postgres:
    image: postgres:15-alpine
    container_name: tarkify-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tarkify_user
      POSTGRES_PASSWORD: tarkifyPassword
      POSTGRES_DB: tarkifyDB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tarkify_user -d tarkifyDB" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
