services:
  postgres:
    image: postgres:15-alpine
    container_name: tarkify-postgres
    restart: always
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: tarkify_user
      POSTGRES_PASSWORD: tarkifyPassword
      POSTGRES_DB: tarkifyDB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tarkify_user -d tarkifyDB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tarkify-backend
    restart: always
    ports:
      - "3009:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://tarkify_user:tarkifyPassword@postgres:5432/tarkifyDB
      # Razorpay keys MUST be set via host environment (never hardcoded)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      STORAGE_PATH: /app/storage
      DOWNLOAD_TOKEN_TTL_SECONDS: ${DOWNLOAD_TOKEN_TTL_SECONDS:-600}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

volumes:
  pgdata:
